services:
  - type: web
    name: guitar-chords-web
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install && npm run db:generate && npm run build
    preDeployCommand: npm run db:migrate && npm run db:seed
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENABLE_DATABASE_READS
        value: "true"
      - key: SEED_DEMO_DATA
        value: "true"
